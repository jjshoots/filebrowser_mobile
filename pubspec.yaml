name: filebrowser_mobile
description: Android client for File Browser (self-hosted) with biometric login and background transfers.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.7.0

  # WebView used to complete captcha-protected logins and harvest the JWT
  webview_flutter: ^4.10.0

  # In-app media: gallery grid thumbnails, zoomable photo viewer, video player
  cached_network_image: ^3.4.0
  photo_view: ^0.15.0
  video_player: ^2.9.0
  chewie: ^1.8.0

  # Secure credential storage (Android Keystore / EncryptedSharedPreferences)
  flutter_secure_storage: ^9.2.2

  # Biometric / device-credential authentication
  local_auth: ^2.3.0

  # Background upload/download with a native foreground service + notifications
  background_downloader: ^8.5.0

  # Simple state management / DI
  provider: ^6.1.2

  # File picking for uploads, and SAF directory picking for download targets
  file_picker: ^11.0.0

  # Hand a downloaded file off to a native Android app (PDF/text/audio/…)
  open_filex: ^4.7.0

  # Typed, non-secret UI preferences (sort order, …)
  shared_preferences: ^2.3.0

  path: ^1.9.0
  path_provider: ^2.1.4
  receive_sharing_intent: ^1.9.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
